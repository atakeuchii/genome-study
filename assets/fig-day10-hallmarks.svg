<svg viewBox="0 0 820 720" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="a10" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#888"/>
    </marker>
  </defs>

  <text x="410" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#222">Hallmarks 早見図 ── 能力 ↔ 代表経路 ↔ 遺伝子</text>
  <text x="410" y="51" text-anchor="middle" font-size="12" fill="#777">中央＝がん細胞。各能力に「経路」と「頻出遺伝子（青=アクセル／赤=ブレーキ）」がぶら下がる</text>

  <!-- center -->
  <circle cx="410" cy="375" r="62" fill="#fff4d6" stroke="#caa23a" stroke-width="2.4"/>
  <text x="410" y="370" text-anchor="middle" font-size="15" font-weight="700" fill="#7a5c10">がん細胞</text>
  <text x="410" y="389" text-anchor="middle" font-size="11" fill="#9a7d2e">8つの能力</text>

  <!-- helper: each hallmark box -->
  <!-- 1 増殖シグナルの維持 (top-left) -->
  <g>
    <rect x="40" y="80" width="250" height="74" rx="10" fill="#eef2fb" stroke="#2f3f8f" stroke-width="1.3"/>
    <text x="56" y="102" font-size="13" font-weight="700" fill="#2f3f8f">① 増殖シグナルの維持</text>
    <text x="56" y="121" font-size="11.5" fill="#333">経路：MAPK / PI3K</text>
    <text x="56" y="140" font-size="11.5" fill="#2f3f8f">KRAS・BRAF・EGFR・PIK3CA（アクセル）</text>
  </g>
  <line x1="290" y1="130" x2="360" y2="340" stroke="#ccc" stroke-width="1.2" marker-end="url(#a10)"/>

  <!-- 2 増殖抑制の回避 (top-right) -->
  <g>
    <rect x="530" y="80" width="250" height="74" rx="10" fill="#fdecea" stroke="#c0392b" stroke-width="1.3"/>
    <text x="546" y="102" font-size="13" font-weight="700" fill="#a5281b">② 増殖抑制の回避</text>
    <text x="546" y="121" font-size="11.5" fill="#333">経路：Rb・p53 の関所</text>
    <text x="546" y="140" font-size="11.5" fill="#a5281b">RB1・TP53・PTEN（ブレーキ）</text>
  </g>
  <line x1="530" y1="130" x2="460" y2="340" stroke="#ccc" stroke-width="1.2" marker-end="url(#a10)"/>

  <!-- 3 細胞死への抵抗性 (left) -->
  <g>
    <rect x="20" y="210" width="250" height="70" rx="10" fill="#e9f6ee" stroke="#2e7d4f" stroke-width="1.3"/>
    <text x="36" y="232" font-size="13" font-weight="700" fill="#1f5d39">③ 細胞死への抵抗性</text>
    <text x="36" y="251" font-size="11.5" fill="#333">経路：BCL-2 系の綱引き</text>
    <text x="36" y="270" font-size="11.5" fill="#555">（BCL-2 ほか）治療抵抗性に直結</text>
  </g>
  <line x1="270" y1="250" x2="352" y2="345" stroke="#ccc" stroke-width="1.2" marker-end="url(#a10)"/>

  <!-- 4 複製の不死化 (right) -->
  <g>
    <rect x="550" y="210" width="250" height="70" rx="10" fill="#e9f6ee" stroke="#2e7d4f" stroke-width="1.3"/>
    <text x="566" y="232" font-size="13" font-weight="700" fill="#1f5d39">④ 複製の不死化</text>
    <text x="566" y="251" font-size="11.5" fill="#333">経路：テロメラーゼ</text>
    <text x="566" y="270" font-size="11.5" fill="#555">TERT（回数券を踏み倒す）</text>
  </g>
  <line x1="550" y1="250" x2="468" y2="345" stroke="#ccc" stroke-width="1.2" marker-end="url(#a10)"/>

  <!-- 5 血管新生の誘導 (left-low) -->
  <g>
    <rect x="20" y="470" width="250" height="70" rx="10" fill="#eef2fb" stroke="#2f3f8f" stroke-width="1.3"/>
    <text x="36" y="492" font-size="13" font-weight="700" fill="#2f3f8f">⑤ 血管新生の誘導</text>
    <text x="36" y="511" font-size="11.5" fill="#333">経路：HIF / VEGF</text>
    <text x="36" y="530" font-size="11.5" fill="#555">VEGF（VHL 等）抗血管新生薬</text>
  </g>
  <line x1="270" y1="500" x2="352" y2="405" stroke="#ccc" stroke-width="1.2" marker-end="url(#a10)"/>

  <!-- 6 浸潤と転移 (right-low) -->
  <g>
    <rect x="550" y="470" width="250" height="70" rx="10" fill="#e9f6ee" stroke="#2e7d4f" stroke-width="1.3"/>
    <text x="566" y="492" font-size="13" font-weight="700" fill="#1f5d39">⑥ 浸潤と転移</text>
    <text x="566" y="511" font-size="11.5" fill="#333">経路：EMT / Wnt</text>
    <text x="566" y="530" font-size="11.5" fill="#555">E-カドヘリン低下で可動化</text>
  </g>
  <line x1="550" y1="500" x2="468" y2="405" stroke="#ccc" stroke-width="1.2" marker-end="url(#a10)"/>

  <!-- 7 ゲノム不安定性 (bottom-left) -->
  <g>
    <rect x="120" y="600" width="270" height="74" rx="10" fill="#fdecea" stroke="#c0392b" stroke-width="1.3"/>
    <text x="136" y="622" font-size="13" font-weight="700" fill="#a5281b">⑦ ゲノム不安定性（土台）</text>
    <text x="136" y="641" font-size="11.5" fill="#333">経路：DNA修復（HR・MMR）</text>
    <text x="136" y="660" font-size="11.5" fill="#a5281b">BRCA1/2・ATM・MLH1/MSH2（管理人）</text>
  </g>
  <line x1="300" y1="600" x2="380" y2="430" stroke="#ccc" stroke-width="1.2" marker-end="url(#a10)"/>

  <!-- 8 免疫からの逃避 (bottom-right) -->
  <g>
    <rect x="440" y="600" width="270" height="74" rx="10" fill="#eef2fb" stroke="#2f3f8f" stroke-width="1.3"/>
    <text x="456" y="622" font-size="13" font-weight="700" fill="#2f3f8f">⑧ 免疫からの逃避</text>
    <text x="456" y="641" font-size="11.5" fill="#333">経路：PD-1 / PD-L1</text>
    <text x="456" y="660" font-size="11.5" fill="#555">指標：MSI・TMB → 免疫療法</text>
  </g>
  <line x1="530" y1="600" x2="440" y2="430" stroke="#ccc" stroke-width="1.2" marker-end="url(#a10)"/>

  <!-- legend -->
  <rect x="318" y="455" width="184" height="26" rx="6" fill="#fafafa" stroke="#ddd"/>
  <text x="410" y="472" text-anchor="middle" font-size="10.5" fill="#555"><tspan fill="#2f3f8f" font-weight="700">青=アクセル</tspan> ／ <tspan fill="#a5281b" font-weight="700">赤=ブレーキ</tspan> ／ <tspan fill="#1f5d39" font-weight="700">緑=その他</tspan></text>
</svg>
